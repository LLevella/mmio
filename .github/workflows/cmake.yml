name: CI/CD

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

permissions:
  contents: read

env:
  BUILD_TYPE: Release

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      shell: bash
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build
      shell: bash
      run: cmake --build build --config $BUILD_TYPE

    - name: Test
      shell: bash
      run: ctest --test-dir build -C $BUILD_TYPE --output-on-failure

  sanitizers:
    name: Sanitizers
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      shell: bash
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DMMIO_ENABLE_SANITIZERS=ON

    - name: Build
      shell: bash
      run: cmake --build build --config Debug

    - name: Test
      shell: bash
      run: ctest --test-dir build -C Debug --output-on-failure

  release:
    name: Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [build, sanitizers]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Configure
      shell: bash
      run: cmake -S . -B build -DCMAKE_BUILD_TYPE=$BUILD_TYPE

    - name: Build
      shell: bash
      run: cmake --build build --config $BUILD_TYPE

    - name: Test
      shell: bash
      run: ctest --test-dir build -C $BUILD_TYPE --output-on-failure

    - name: Package
      shell: bash
      run: cmake --build build --target package --config $BUILD_TYPE

    - name: Upload release artifacts
      uses: actions/upload-artifact@v4
      with:
        name: mmio-release-${{ github.ref_name }}
        path: |
          build/mmio-*.tar.gz
          build/mmio-*.zip
          build/mmio-*.sha256

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/mmio-*.tar.gz
          build/mmio-*.zip
          build/mmio-*.sha256
        generate_release_notes: true
